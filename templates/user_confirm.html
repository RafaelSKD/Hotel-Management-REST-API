<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Account Confirmation</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-5 text-center">

                        <!-- Icon -->
                        <div class="mb-4">
                            <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                        </div>

                        <h2 class="fw-bold text-success mb-2">Account Confirmed</h2>
                        <p class="text-muted mb-4">Your registration was successful.</p>

                        <div class="mb-3">
                            <p class="mb-1 fw-semibold">Username</p>
                            <p class="fs-5">{{ usuario }}</p>
                        </div>

                        <div class="mb-4">
                            <p class="mb-1 fw-semibold">Email</p>
                            <p class="fs-5">{{ email }}</p>
                        </div>

                        <div class="alert alert-success mt-4" role="alert">
                            Your account is now active and ready to use.
                        </div>

                    </div>
                </div>

                <p class="text-center text-muted mt-4 small">
                    Panados Hotel API © 2026
                </p>

            </div>
        </div>
    </div>

</body>
</html>
